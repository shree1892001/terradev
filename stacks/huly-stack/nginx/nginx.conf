events {}

http {
  client_max_body_size 100m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream huly_front { server huly-front:8080; }
  upstream huly_account { server huly-account:3000; }
  upstream huly_transactor { server huly-transactor:8080; }
  upstream huly_collaborator { server huly-collaborator:3078; }
  upstream huly_rekoni { server huly-rekoni:4004; }
  upstream huly_fulltext { server huly-fulltext:4700; }
  upstream huly_kvs { server huly-kvs:8094; }

  server {
    listen 80;

    location / {
      proxy_pass http://huly_front;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /accounts/ {
      proxy_pass http://huly_account/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /transactor/ {
      proxy_pass http://huly_transactor/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /collaborator/ {
      proxy_pass http://huly_collaborator/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /rekoni/ {
      proxy_pass http://huly_rekoni/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fulltext/ {
      proxy_pass http://huly_fulltext/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kvs/ {
      proxy_pass http://huly_kvs/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
