global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus-server
    static_configs:
      - targets: ['prometheus:9090']
        labels:
          service: prometheus
          application: prometheus
          tier: tier-2

  - job_name: jenkins-server
    metrics_path: /prometheus
    static_configs:
      - targets: ['jenkins:8080']
        labels:
          service: jenkins
          application: jenkins
          tier: tier-3

  - job_name: postgres-exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: postgres
          application: postgres
          tier: tier-0

  - job_name: redis-exporter
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: redis
          application: redis
          tier: tier-0

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: node-exporter
          application: node-exporter
          tier: tier-3

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: cadvisor
          application: cadvisor
          tier: tier-3

  - job_name: blackbox-exporter
    static_configs:
      - targets: ['blackbox-exporter:9115']
        labels:
          service: blackbox-exporter
          application: blackbox-exporter
          tier: tier-3

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://jenkins:8080/login
          - http://grafana:3000/login
          - http://prometheus:9090/-/ready
          - http://alertmanager:9093/-/ready
          - http://cadvisor:8080/metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
