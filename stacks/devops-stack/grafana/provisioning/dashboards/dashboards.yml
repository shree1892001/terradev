apiVersion: 1

providers:
  - name: RedBeryl DevOps Dashboards
    orgId: 1
    folder: RedBeryl DevOps
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
